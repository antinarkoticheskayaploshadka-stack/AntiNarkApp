<!doctype html>
<html lang="ru">
<head>

    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>AntiNarkApp</title>

</head>
<body>
    <div id="main">
        <h1>Молодежная антинаркотическая площадка</h1>
        <div>
            <img src="https://image2url.com/r2/default/images/1775138989679-9e8fd7e3-c2d9-4bc9-a4a1-272263373534.png" width="300" height="300"/>
        </div>
        <div>
            <button id="win">ПОЛУЧИТЬ МАТЕРИАЛЫ</button1>
        </div>    
    </div>
    <order id="order">
        <h2>ВЫБЕРИТЕ ТЕМАТИКУ</h2>
        <button id="alco"><img src="https://image2url.com/r2/default/images/1775416292104-8095dc2c-b959-480b-8dbc-9fb3a41b1ac0.png" width="175" height="175" /></button>
        <button id="narco"><img src="https://image2url.com/r2/default/images/1775417801791-9ccee080-4a91-4289-92af-e36f632dd3df.png" width="175" height="175" /></button>
        <button id="vape"><img src="https://image2url.com/r2/default/images/1775417404487-75db5e54-cdb8-430e-8b91-bd464ec8ddd4.png" width="175" height="175" /></button>
        <button id="energy"><img src="https://image2url.com/r2/default/images/1775418219456-f67c1e60-2e21-4ac6-97e0-af5dca842374.png" width="175" height="175" /></button>
    </order>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let td = window.Telegram.WebApp;
        let buy = document.getElementById("win");

        buy.addEventListener("click", () => {
            document.getElementById("main").style.display = "none";
            document.getElementById("order").style.display = "block";
        });


        alco.addEventListener("click", () => {
            tg.close();
        })
    </script>
</body>
</html>
